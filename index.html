<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radhee Love</title>
</head>
<body>
    <audio id="happy-audio" src="happy.mp3" preload="auto"></audio>
    <audio id="sad-audio" src="sad.mp3" preload="auto"></audio>
    <audio id="love-audio" src="love.mp3" preload="auto"></audio>

    <script>
        function goTo(page) {
            // Pause all audio
            document.getElementById('happy-audio').pause();
            document.getElementById('sad-audio').pause();
            document.getElementById('love-audio').pause();

            switch (page) {
                case 'p1':
                case 'p2':
                case 'p3':
                case 'psnooze':
                case 'pnotready':
                case 'p6':
                    document.getElementById('happy-audio').play();
                    break;
                case 'p4a':
                case 'p5a':
                    document.getElementById('sad-audio').play();
                    break;
                case 'pfinal':
                    document.getElementById('love-audio').play();
                    break;
                default:
                    break;
            }
            // Here you would add the code to actually navigate to the new page
        }
    </script>
</body>
</html>
